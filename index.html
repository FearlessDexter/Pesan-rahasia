<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SURPRISE BUAT KAMU! 🎀</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Arial', sans-serif;
            /* BACKGROUND LANGSUNG HELLO KITTY */
            background: url('https://i.pinimg.com/originals/30/e1/92/30e19253ec026365449265f2427f7422.jpg') no-repeat center center fixed;
            background-size: cover;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        #overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: pink;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        #konten-utama {
            background: rgba(255, 255, 255, 0.9);
            padding: 30px;
            border-radius: 25px;
            box-shadow: 0 0 20px rgba(255, 20, 147, 0.5);
            text-align: center;
            max-width: 85%;
            display: none;
            border: 5px solid #ffb6c1;
            position: relative;
        }

        .foto-container {
            width: 150px; height: 150px;
            border-radius: 50%;
            overflow: hidden;
            margin: 0 auto 15px;
            border: 4px solid #ff69b4;
        }

        .foto-container img { width: 100%; height: 100%; object-fit: cover; }

        button {
            padding: 15px 30px;
            font-size: 1.2rem;
            background: #ff1493;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        /* PARTIKEL LEDAKAN */
        .confetti {
            position: absolute;
            width: 10px; height: 10px;
            border-radius: 50%;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="overlay">
        <button onclick="bukaKejutan()">KLIK UNTUK KEJUTAN! ✨</button>
    </div>

    <div id="konten-utama">
        <h1 style="color: #ff1493;">Hi Kamu! 🎀</h1>
        <div class="foto-container">
            <img src="https://i.pinimg.com/originals/ce/dd/a7/cedda739a489745166299f0e15967008.gif">
        </div>
        <p><b>Kamu itu hebat banget! 🥳</b></p>
        <p>Teruslah bersinar seperti bintang. ✨</p>
    </div>

    <script>
        function bukaKejutan() {
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('konten-utama').style.display = 'block';
            
            // Trigger Ledakan 5 kali
            for(let i=0; i<5; i++) {
                setTimeout(buatLedakan, i * 300);
            }
        }

        function buatLedakan() {
            const colors = ['#ff69b4', '#ff1493', '#ffd700', '#00ff00', '#00ffff'];
            for (let i = 0; i < 40; i++) {
                const conf = document.createElement('div');
                conf.classList.add('confetti');
                conf.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                conf.style.left = '50%';
                conf.style.top = '50%';
                
                const angle = Math.random() * Math.PI * 2;
                const velocity = Math.random() * 150 + 50;
                const tx = Math.cos(angle) * velocity + 'px';
                const ty = Math.sin(angle) * velocity + 'px';

                document.body.appendChild(conf);

                conf.animate([
                    { transform: 'translate(-50%, -50%)', opacity: 1 },
                    { transform: `translate(calc(-50% + ${tx}), calc(-50% + ${ty}))`, opacity: 0 }
                ], {
                    duration: 1000,
                    easing: 'ease-out'
                }).onfinish = () => conf.remove();
            }
        }
    </script>
</body>
</html>
