<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PESAN UNTUK KAMU 🎀</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Arial', sans-serif;
            /* Warna pink terang agar tidak putih polos */
            background-color: #ffc0cb; 
            background-image: url('https://w0.peakpx.com/wallpaper/429/952/HD-wallpaper-hello-kitty-sweet-pink-cartoon-kitty-pink-sweet-cat.jpg');
            background-size: cover;
            background-position: center;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        #overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #ffb6c1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        #konten-utama {
            background: rgba(255, 255, 255, 0.9);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: center;
            width: 80%;
            display: none;
            border: 4px solid #ff69b4;
            position: relative;
        }

        .foto-container {
            width: 180px; height: 180px;
            border-radius: 50%;
            overflow: hidden;
            margin: 0 auto 15px;
            border: 5px solid #ff69b4;
            background: #fff;
        }

        .foto-container img { width: 100%; height: 100%; object-fit: cover; }

        button {
            padding: 15px 35px;
            font-size: 1.2rem;
            background: #ff1493;
            color: white;
            border: 3px solid white;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        /* Gaya Emoji Hujan */
        .heart { position: fixed; top: -10vh; animation: fall 3s linear forwards; z-index: 1; }
        @keyframes fall { to { transform: translateY(110vh); } }

        /* Partikel Ledakan Kembang Api */
        .confetti {
            position: absolute; width: 10px; height: 10px;
            border-radius: 50%; pointer-events: none; z-index: 99;
        }
    </style>
</head>
<body>

    <div id="overlay">
        <h2 style="color: white;">Ada Pesan Rahasia!</h2>
        <button onclick="buka()">BUKA SEKARANG 🎁</button>
    </div>

    <audio id="laguku" loop>
        <source src="lagu.mp3" type="audio/mpeg">
    </audio>

    <div id="konten-utama">
        <h1 style="color: #ff1493;">Hi Kamu! ✨</h1>
        <div class="foto-container">
            <img src="foto.jpg" onerror="this.src='https://media.tenor.com/2X8K-78D7mUAAAAM/hello-kitty-hi.gif'">
        </div>
        <p style="font-size: 1.1rem; font-weight: bold;">Kamu itu hebat banget! 🥳</p>
        <p>Tetap semangat & jangan menyerah ya! 💪🏻🎀</p>
    </div>

    <script>
        function buka() {
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('konten-utama').style.display = 'block';
            
            var audio = document.getElementById('laguku');
            audio.play();

            // Jalankan hujan emoji
            setInterval(function() {
                var h = document.createElement('div');
                h.classList.add('heart');
                h.innerHTML = "💖";
                h.style.left = Math.random() * 100 + "vw";
                h.style.fontSize = "25px";
                document.body.appendChild(h);
                setTimeout(() => h.remove(), 3000);
            }, 300);

            // Ledakan kembang api
            for(var i=0; i<5; i++) {
                setTimeout(ledakan, i * 400);
            }
        }

        function ledakan() {
            var colors = ['#ff69b4', '#ff1493', '#ffd700', '#00ffff'];
            for (var i = 0; i < 30; i++) {
                var c = document.createElement('div');
                c.classList.add('confetti');
                c.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                c.style.left = '50%'; c.style.top = '50%';
                var angle = Math.random() * Math.PI * 2;
                var dist = Math.random() * 150 + 50;
                var x = Math.cos(angle) * dist + 'px';
                var y = Math.sin(angle) * dist + 'px';
                document.body.appendChild(c);
                c.animate([
                    { transform: 'translate(-50%, -50%) scale(1)', opacity: 1 },
                    { transform: `translate(calc(-50% + ${x}), calc(-50% + ${y})) scale(0)`, opacity: 0 }
                ], { duration: 1000, easing: 'ease-out' }).onfinish = () => c.remove();
            }
        }
    </script>
</body>
</html>
